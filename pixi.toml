# pixi workspace — seeded by `shipit install` (the managed blocks below
# need a valid manifest). Consumer-owned from here on: edit freely.
[workspace]
name = "lex-fmt_tree-sitter-lex"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-64", "osx-arm64"]

[tasks]
# >>> shipit-managed test task (do not edit; regenerate via `shipit install`) >>>
test = "./bin/shipit test"
# <<< shipit-managed test task <<<
# >>> shipit-managed tasks (do not edit; regenerate via `shipit install`) >>>
changelog = "./bin/shipit changelog"
lint = "./bin/shipit lint"
logs = "./bin/shipit logs"
# <<< shipit-managed tasks <<<
# The wf-checks TEST LANE's run (ADP02-WS03, #87) — NOT the managed bare `test`
# task above: `./bin/shipit test` dispatches the npm toolchain leg (`npm test`
# -> `tree-sitter test`, corpus only), while this repo's real umbrella is
# app-bin/test-all (corpus + bats no-errors + parity), the same entry the
# legacy CI ran. The lane SELF-PROVISIONS (the lex#829-proven pattern) because
# the wf-checks checkout has no submodule support and a hosted runner has no
# node_modules: init the `comms` submodule (spec fixtures the bats generator
# reads), `npm ci` the tree-sitter CLI + bats from the committed lockfile, then
# run the umbrella. test-all provisions its OWN lexd at the shared/lex-deps.json
# pin (v0.14.1 — the version the parity contract is written against;
# `shipit provision lexd` would install latest and is deliberately NOT used
# here). smoke-grammars.sh rides along because the legacy check-command chained
# it (`bin/check && app-bin/smoke-grammars.sh`) — same coverage, same order.
# Idempotent and laptop-runnable: `pixi run --locked test-full`.
test-full = "git submodule update --init --recursive && npm ci && app-bin/test-all && app-bin/smoke-grammars.sh"

[feature.lint.dependencies]
# >>> shipit-managed lint deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned lint toolchain (https://github.com/arthur-debert/shipit/blob/main/docs/legacy-prd/adoption.md:
# the managed set owns the consumer environment).
# Canonical versions live HERE — a bump is one data edit, rolled fleet-wide on
# each consumer's next `shipit install` reconcile.
ruff = "0.15.*"
# shellcheck is PINNED DOWN to 0.10.* (not 0.11): shellcheck 0.11.0 has an SC2218
# reaching-definitions false positive — a call to an EARLIER-defined function is
# flagged "defined later" when a subshell (`$(...)`, a pipeline component, `<(...)`)
# sits near the call, reddening the hermetic gate on CORRECT code across 5+ fleet
# repos. 0.11.0 is the latest upstream (no fixed 0.11.x yet); restore 0.11+ when
# upstream fixes it.
shellcheck = "0.10.*"
# conda-forge name for the `shfmt` binary
go-shfmt = "3.*"
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
# GitHub Actions workflow gate — the actions Lang of `shipit lint` (TOL01-WS04)
actionlint = "1.7.*"
lefthook = "2.1.*"
# <<< shipit-managed lint deps <<<

[feature.lint.tasks]
# The wf-checks LINT LANE's run (ADP02-WS03, #87), byte-modeled on shipit's own
# and lex#829's: the lint toolchain (ruff/shfmt/prettier/markdownlint/
# actionlint/...) lives in THIS feature's env, so the lane task must resolve
# into the lint env — the managed bare `lint` task is a fixed plain string that
# runs in the default env (where none of those tools exist on a hosted runner)
# and cannot provision the lex leg's lexd. `provision lexd` inline lands lexd
# in this env's prefix, idempotent. Defined ONLY in this feature, so it exists
# in EXACTLY ONE env (lint) and bare `pixi run lint-full` resolves
# unambiguously — the wf-checks matrix job's `pixi run --locked lint-full` and
# a laptop run are identical.
lint-full = { cmd = "./bin/shipit lint" }

[environments]
# >>> shipit-managed environments (do not edit; regenerate via `shipit install`) >>>
lint = ["lint", "shipit-lexd"]
# <<< shipit-managed environments <<<

[dependencies]
# >>> shipit-managed tree-sitter release deps (do not edit; regenerate via `shipit install`) >>>
# The tree-sitter toolchain's CLI (#890, closing TOL02-WS17 open hole 7):
# the tree-sitter toolchain's build slot runs `tree-sitter generate` and its
# test slot `tree-sitter test` (the corpus lane), and the release stages
# execute shipit in the DEFAULT pixi env (`pixi run --locked ./bin/shipit`),
# so the CLI anchors HERE — [dependencies], not a feature — where that run's
# PATH resolves it. Delivered on the tree-sitter toolchain DECLARATION (a
# `.shipit.toml` [toolchains] leg — no manifest signals a grammar, the
# wasm-pack→node-deps union mechanics, `Toolchain.provisions_signal`).
# Provisioned from conda-forge under setup-pixi's lockfile-keyed cache (the
# #582 doctrine: the release run NEVER installs at run time). Pinned to the
# minor line (`0.25.*` — conda match-spec) in PARITY with the fleet grammar
# consumer's own devDependency reference (tree-sitter-lex pins `^0.25.0`):
# the generated parser's shape follows the CLI's minor line, so this pin and
# the consumers' devDependency line move together — bump BOTH in one story,
# never one side alone. A bump is one data edit, rolled out on each
# consumer's next `shipit install` reconcile. If this repo no longer ships a
# tree-sitter grammar (the [toolchains] tree-sitter leg is gone), delete this
# block and its `pixi.toml#shipit-tree-sitter-release-deps` entry in
# .shipit.toml's [managed] table — a reconcile only ADDS toolchain blocks, it
# never retires one.
tree-sitter-cli = "0.25.*"
# <<< shipit-managed tree-sitter release deps <<<
# >>> shipit-managed node deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned node runtime (#547 Layer 1) — delivered because this repo
# tracks a package.json. Unlike the rust/go blocks this is NOT a linter
# toolchain: it provisions the repo's OWN node/pnpm runtime (npm rides the
# nodejs package), which is why it lives in the DEFAULT env's [dependencies]
# rather than the lint feature. If this repo no longer ships node (the last
# package.json is gone), delete this block and its `pixi.toml#shipit-node-deps`
# entry in .shipit.toml's [managed] table — a reconcile only ADDS toolchain
# blocks, it never retires one.
nodejs = "26.*"
pnpm = "11.*"
# <<< shipit-managed node deps <<<
# Consumer-owned dependencies (outside the shipit-managed block above),
# added for the wf-checks lanes (ADP02-WS03, #87): both lanes run
# `pixi run --locked <task>` on a hosted runner where nothing outside pixi
# is provisioned.
# uv backs the pinned bin/shipit launcher (ADR-0033: it provisions the repo's
# pinned shipit via uv, PATH-independent). The wf-checks plan job and the lint
# lane both run ./bin/shipit, and neither the block nor the managed set
# provisions uv for a consumer (known gap: shipit#758) — so the launcher's one
# prerequisite must ride the env. Same consumer unblock as lex#829.
uv = ">=0.5"
# jq backs app-bin/smoke-grammars.sh (part of the test lane), so the lane is
# self-contained rather than leaning on the runner image's system jq.
jq = "1.*"

# >>> shipit-managed lexd feature (do not edit; regenerate via `shipit install`) >>>
[feature.shipit-lexd]
# lexd — the lex Lang's lint-gate tool — resolved as an ordinary conda package
# from the public Artifact channel (ADR-0066: `provision lexd` retired). The
# channel is scoped to THIS reserved feature (a sibling of conda-forge, added to
# whatever env `shipit-lexd` is wired into — the lint env), so lexd rides
# pixi.lock and pixi's sha256 like every other linter, and `shipit install`
# keeps the whole fleet on ONE lexd version — uniformity moved from a compiled
# binary constant to this managed block (ADR-0047: not consumer config).
channels = ["https://storage.googleapis.com/shipit-artifacts-public/lex-fmt/lex"]

# The fleet-pinned lexd, PLATFORM-SCOPED via pixi `[target]` tables to the
# channel's CLOSED SERVED SET (#1068) — `SERVED_SUBDIRS`
# (`src/shipit/channel/buckets.py`): osx-arm64/linux-64/linux-aarch64 AND win-64.
# The one target table per served subdir below IS that set; keep the two in step
# (drift-guarded by `test_load_units_includes_the_managed_lexd_feature_block`,
# which asserts these targets == `SERVED_SUBDIRS`). A bump is one edit here,
# rolled fleet-wide on each consumer's next `shipit install` reconcile;
# exact-pinned (`==`) so uniformity is a single version, never a resolved range.
#
# Scoping is load-bearing AND fail-closed-preserving:
#  - A BLANKET `[feature.shipit-lexd.dependencies]` applied lexd to EVERY platform
#    a composing env declares, so a consumer declaring a platform OUTSIDE the
#    served set (e.g. osx-64, Intel Mac) had no channel candidate and got an
#    unsatisfiable lint-env solve — `shipit install` then failed closed with no
#    commit and no reconcile (#1068). Platforms NOT in the served set now carry
#    NO lexd dep, so their lint env SOLVES and install/reconcile no longer breaks.
#  - win-64 IS in the served set (served, merely owner-PAUSED under the Windows
#    build pause #895, ADR-0071), so it KEEPS a target dep. The channel serves no
#    win-64 lexd while the pause holds, so a win-64 lint solve finds no candidate
#    and FAILS CLOSED — ADR-0071's "Windows consumers fail closed, loudly." Drop
#    the win-64 target and a win-64 consumer would instead solve WITHOUT lexd
#    (fail-open), silently breaking that invariant. It re-resolves automatically
#    when #895 lifts and the channel produces win-64 — no edit here.
[feature.shipit-lexd.target.osx-arm64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.linux-64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.linux-aarch64.dependencies]
lexd = "==0.19.10"
[feature.shipit-lexd.target.win-64.dependencies]
lexd = "==0.19.10"
# <<< shipit-managed lexd feature <<<
