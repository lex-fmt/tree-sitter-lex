# [secrets] — repo Actions secrets. Each table key is the GitHub secret NAME; the
# value names exactly one source ({ doppler = "KEY" } / { env = "VAR" } /
# { prompt = true }). Seeded with shipit's local-reviewer (codex/agy) GitHub App
# credentials, each sourced from Doppler github/prd. `shipit gh-setup` only pushes
# a secret when its source resolves, so these are safe before the App is installed.
[secrets]
CODEX_REVIEW_APP_PRIVATE_KEY = { doppler = "CODEX_REVIEW_APP_PRIVATE_KEY" }
CODEX_REVIEW_APP_ID          = { doppler = "CODEX_REVIEW_APP_ID" }
AGY_REVIEW_APP_PRIVATE_KEY   = { doppler = "AGY_REVIEW_APP_PRIVATE_KEY" }
AGY_REVIEW_APP_ID            = { doppler = "AGY_REVIEW_APP_ID" }

# [reviewers] — the required-reviewer SET for this repo's PRs (the map KEYS are
# required; ALL must be DONE to flip Ready). Seeded with shipit's shipped default
# (Copilot, review-once), rendered from the single source in
# `prstate.reviewers_config.DEFAULT_REVIEWERS`. codex/agy are NOT seeded by default —
# their review GitHub Apps are not installed on an arbitrary repo, so requiring them
# would park PRs at REVIEWS_PENDING; a repo that HAS the Apps opts them in here (e.g.
# `codex = {}`). Review-once: `rerun` defaults OFF (token-billed; opt in per reviewer
# with e.g. `copilot = { rerun = true }`).
[reviewers]
copilot = {}

# [lint].ignore — paths the managed lint gate must SKIP. Seeded with common
# generated/assembled files (a built CHANGELOG, package lockfiles) that are not
# hand-written prose, so a freshly-onboarded repo does not take a latent gate
# failure on them. Gitignore-style globs. You OWN this list and may extend it —
# it is reconcile-safe: `shipit install` seeds [lint] only when absent and never
# clobbers a table you have edited.
[lint]
ignore = [
  "CHANGELOG.md",
  "CHANGELOG/**",
  "package-lock.json",
  "pnpm-lock.yaml",
  # Generated tree-sitter parser artifacts (regenerated by `tree-sitter generate`
  # from grammar.js): C descoped to universal-linters-only (LNT01 WS07 #520), and
  # the JSON emitted here is machine-formatted, not prettier's style. The external
  # scanner (src/scanner.c) and grammar source (grammar.js) are hand-written and
  # deliberately NOT listed.
  "src/parser.c",
  "src/grammar.json",
  "src/node-types.json",
  "src/tree_sitter/**",
]

# [lanes] — the declared PR-time check units (ADP02-WS03, #87). The lane
# planner (`shipit ci plan`) maps these + the CI event + a path-diff to the job
# matrix the wf-checks workflow block runs (`pixi run --locked <run>` per job).
# Modeled on lex#829 (the first-consumer cutover); both lanes' tasks
# SELF-PROVISION, because on a hosted runner nothing outside pixi exists:
#   - `lint-full` (NOT the managed bare `lint` task, which runs in the default
#     env where no lint tool exists) resolves into the pixi lint env and
#     provisions lexd inline — see its definition in pixi.toml
#     [feature.lint.tasks].
#   - `test-full` inits the `comms` submodule (the bats generator's spec
#     fixtures) and `npm ci`s the tree-sitter CLI + bats inline before running
#     the app-bin/test-all umbrella + smoke-grammars — the wf-checks checkout
#     has no submodule support and a hosted runner has no node_modules; uv
#     (for bin/shipit) and jq (for smoke-grammars) ride pixi's default env
#     ([dependencies] in pixi.toml).
[lanes.lint]
run = "lint-full"
required = true
local = true

[lanes.test]
run = "test-full"
required = true
local = true

# [toolchains] — the ADR-0007 path→toolchain map, the repo's structural
# self-description. The root leg is the GRAMMAR (build = `tree-sitter
# generate`, test = `tree-sitter test` — the closed-registry tree-sitter
# toolchain, shipit#824), not an npm package: the install-seeded `npm`
# detection keyed off package.json, but that manifest only carries the
# tree-sitter CLI devDependency — nothing here builds or publishes an npm
# package (legacy `publish-npm: false`). The switch is what lets the
# [artifacts] build target below resolve to a leg (an [artifacts] build
# target whose toolchain has no [toolchains] leg is refused).
[toolchains]
"." = "tree-sitter"

# [artifacts] — the declared release surface (ADP02-WS09 #90, the first
# consumer fire of shipit's tree-sitter composition + notify-downstreams
# cascade, shipit#824/TOL02-WS16). ONE artifact, matching the legacy
# surface (release.yml → tree-sitter.yml@v3, verified against v0.11.2):
#   - build: the tree-sitter leg above (`tree-sitter generate`);
#   - bundle: the `tarball` composition → `tree-sitter.tar.gz` (the
#     artifact NAME is the asset name — parity with the legacy asset the
#     editor repos fetch via shared/lex-deps.json). Platform-independent
#     generated C source, so no `platforms` list: the default lane builds
#     it once;
#   - endpoints: gh-release (rides the workflow GITHUB_TOKEN) +
#     notify-downstreams — the layer-2 cascade (lex-fmt/lex#640): one
#     `upstream-release` repository_dispatch per repo below on a REAL
#     release (the RC guard/prerelease plan suppress it), replacing the
#     legacy `notify-downstreams:` input. Requires the cross-repo
#     DOWNSTREAM_DISPATCH_TOKEN at publish (the ambient GITHUB_TOKEN
#     cannot dispatch into another repo).
# npm publish stays off, as in legacy: no npm endpoint, no npm build leg.
[artifacts.tree-sitter]
build = ["tree-sitter"]
bundle = { composition = "tarball" }
endpoints = ["gh-release", "notify-downstreams"]
downstreams = ["lex-fmt/vscode", "lex-fmt/nvim", "lex-fmt/lexed"]

