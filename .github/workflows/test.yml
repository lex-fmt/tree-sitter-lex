name: CI

# Thin caller of arthur-debert/release/.github/workflows/tree-sitter-ci.yml.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    uses: arthur-debert/release/.github/workflows/tree-sitter-ci.yml@v1
    with:
      # This repo's umbrella entry point is bin/check (matches the
      # pre-commit gate). The smoke-grammars sanity step historically
      # ran AFTER the umbrella in the bespoke workflow; preserve that
      # ordering with `&&`.
      check-command: 'bin/check && app-bin/smoke-grammars.sh'
      # Submodules carry vendored dependencies the grammar generates against.
      submodules: true
