name: Tree-sitter CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run all checks
        run: scripts/test-all

      - name: Smoke-check embedded grammars manifest
        run: scripts/smoke-grammars.sh
