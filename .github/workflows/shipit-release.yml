name: shipit-release

# tree-sitter-lex's shipit release caller (ADP02-WS09, the lex fleet
# cutover — arthur-debert/shipit#842, this repo's slice #90) — the WS09
# BLESSED per-stage dispatch shape (ADR-0054, workflows.lex §8), copied
# from arthur-debert/shipit's own shipit-release.yml: one
# workflow_dispatch caller with a `stage` choice (full | prepare | build |
# sign | publish), one job per stage, each a single `uses:` line against
# the matching block, gated `if: inputs.stage == '...'`, forwarding
# `version`/`tag`/`run-id`/`unsigned` verbatim. Routing ONLY (ADR-0040):
# the release plan — matrix, live stages, the post-RC-guard endpoint set,
# required secrets — is preflight's, computed inside the blocks; nothing
# is re-derived or wired stage-to-stage here.
#
# Every ref is the FULL remote `arthur-debert/shipit/...@v1` form — never
# `./` relative (which would resolve against THIS repo, where no blocks
# live), never SHA-pinned (the fleet rides the advance-major-moved `v1`,
# ADR-0010).
#
# tree-sitter-lex's release surface is ONE artifact (.shipit.toml
# [artifacts.tree-sitter]) — the first consumer fire of shipit's
# tree-sitter composition + notify-downstreams cascade (shipit#824,
# TOL02-WS16): the tree-sitter build leg (`tree-sitter generate`), the
# `tarball` bundle composing the platform-independent
# `tree-sitter.tar.gz` (asset-name parity with the legacy
# tree-sitter.yml@v3 release the editor repos fetch via
# shared/lex-deps.json), and the gh-release + notify-downstreams
# endpoints (one `upstream-release` repository_dispatch each to
# lex-fmt/{vscode,nvim,lexed} on a REAL release — the RC guard and the
# prerelease plan suppress the cascade). No sign stage in the plan
# (nothing darwin, nothing signable); the `sign` choice stays offered
# because this caller rides the blessed shape, never a trimmed variant.
#
# Secrets — exactly the plan-required set for this plan:
#   RELEASE_TOKEN              prepare's tag+branch push through the
#                              ruleset (a GITHUB_TOKEN push would not
#                              re-trigger workflows).
#   DOWNSTREAM_DISPATCH_TOKEN  the notify-downstreams endpoint's
#                              cross-repo PAT (the ambient GITHUB_TOKEN
#                              cannot dispatch into another repo).
#                              Forwarded to the stages that can publish
#                              (`full`, `publish`); NOT YET PROVISIONED
#                              on this repo (flagged in #90 — the
#                              coordinator provisions it before the rc;
#                              forwarded regardless, per the workstream
#                              brief).
# gh-release rides the workflow's own GITHUB_TOKEN (no registry entry).
# The Apple signing set is not forwarded: the plan carries no sign stage,
# and preflight refuses a break-glass `--unsigned` on it.
#
# The legacy caller (release.yml → tree-sitter.yml@v3) stays untouched
# until the rc proof lands; its removal is a follow-up, not this cutover.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          The release version, consumed by `full`/`prepare`: a bare semver
          (1.0.0, 1.0.0-release-rc) or a bump word (major|minor|patch).
          Ignored by the tag-dispatched stages.
        required: false
        type: string
      stage:
        description: >-
          What to dispatch: the full composed chain (default) or ONE
          independently re-runnable stage block (per-stage dispatch,
          ADR-0054). `prepare` dispatches on `version`; `build`, `sign`
          and `publish` on `tag` (+ `run-id` for the artifact-consuming
          stages).
        required: false
        type: choice
        default: full
        options:
          - full
          - prepare
          - build
          - sign
          - publish
      tag:
        description: >-
          The release tag (v<version>), consumed by the `build`/`sign`/
          `publish` stage dispatches (ADR-0041: the version is read off
          the tag). Ignored by `full`/`prepare`.
        required: false
        type: string
      run-id:
        description: >-
          The SOURCE run id whose artifacts feed an artifact-consuming
          stage dispatch (`sign`, `publish`) — one source run per dispatch
          (workflows.lex §8). Ignored by the other stages.
        required: false
        type: string
      unsigned:
        description: >-
          Break-glass: flip a signing plan to the unsigned path. Forwarded
          verbatim; this repo's plan has no sign stage, so preflight
          refuses it here — offered because this caller rides the blessed
          shape.
        required: false
        type: boolean
        default: false

# The standalone dispatch caller's grant (workflows.lex §8): `contents:
# write` for prepare's push and publish's gh-release, `actions: read` for
# the cross-run artifact downloads (`run-id` flips download-artifact onto
# the REST API). The downloading blocks deliberately declare NO
# `permissions:` key — a called workflow can only downgrade this token.
permissions:
  contents: write
  actions: read

jobs:
  release:
    if: inputs.stage == 'full'
    uses: arthur-debert/shipit/.github/workflows/wf-release.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      DOWNSTREAM_DISPATCH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}

  prepare:
    if: inputs.stage == 'prepare'
    uses: arthur-debert/shipit/.github/workflows/wf-prepare.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build:
    if: inputs.stage == 'build'
    uses: arthur-debert/shipit/.github/workflows/wf-build.yml@v1
    with:
      tag: ${{ inputs.tag }}

  sign:
    if: inputs.stage == 'sign'
    uses: arthur-debert/shipit/.github/workflows/wf-sign-mac.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}

  publish:
    if: inputs.stage == 'publish'
    uses: arthur-debert/shipit/.github/workflows/wf-publish.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      DOWNSTREAM_DISPATCH_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
