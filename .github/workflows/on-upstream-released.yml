# Layer 2 handler: react to an upstream's release.
#
# Thin caller into the reusable cascade-handler workflow at
# arthur-debert/release/.github/workflows/cascade-handler.yml. That
# workflow implements the should-release → bump → PR → admin-merge →
# trigger-release chain, with all 10 cascade-doc gotchas folded in
# (shell-injection guards on dispatch payload reads, GH_TOKEN on every
# primitive step, --admin merge, post-merge `git reset --hard`,
# manifest-vs-tag drift guard, stale-release-branch cleanup,
# UNRELEASED.md seed). Onboarding doc:
#   arthur-debert/release/docs/lex-release-cascade.md
#
# This repo's five `scripts/release/*` primitives are the per-repo
# contract the reusable workflow consumes. Manual trigger for
# testing / recovery:
#
#   gh api repos/lex-fmt/tree-sitter-lex/dispatches \
#     --method POST \
#     -f event_type=upstream-released \
#     -F client_payload[source]=comms \
#     -F client_payload[version]=v0.16.2

name: On upstream released

on:
  repository_dispatch:
    types: [upstream-released]

# The reusable cascade-handler requests `contents: write` +
# `pull-requests: write` (it bumps, opens, and admin-merges the release
# PR). A reusable workflow cannot be granted more than the caller's
# GITHUB_TOKEN holds, and this repo's default workflow token is
# read-only — so without this block the call is rejected at startup
# (`startup_failure`, no logs). Every other lex-fmt cascade caller
# already carries it; this one was dropped when the handler became a
# thin caller. See arthur-debert/release#805.
permissions:
  contents: write
  pull-requests: write

jobs:
  cascade:
    uses: arthur-debert/release/.github/workflows/cascade-handler.yml@v3
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
