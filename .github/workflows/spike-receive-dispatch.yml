# Spike: receive a repository_dispatch event from an upstream repo.
#
# Layer 2 (event-driven cascade) of the cross-repo release automation —
# see lex-fmt/lex#640. This workflow is a deliberate spike: it receives
# the event and just echoes the payload, with no real release work, so
# we can validate cross-repo dispatch (event_type matching, payload
# integrity, latency) before wiring the real handler.
#
# Triggered from comms by:
#   gh workflow run spike-emit-dispatch.yml --repo lex-fmt/comms
#
# Inspect this run:
#   gh run list --repo lex-fmt/tree-sitter-lex --workflow=spike-receive-dispatch.yml
#
# Deleted (or repurposed as a smoke-test path) once the real handler
# workflow lands.
name: Spike — receive repository_dispatch

on:
  repository_dispatch:
    types: [spike-cascade]

permissions:
  contents: read

jobs:
  receive:
    runs-on: ubuntu-latest
    steps:
      - name: Echo payload
        run: |
          set -euo pipefail
          echo "Received $GITHUB_EVENT_NAME / ${{ github.event.action }}"
          echo "  source:  ${{ github.event.client_payload.source }}"
          echo "  version: ${{ github.event.client_payload.version }}"
          echo "  ts:      ${{ github.event.client_payload.ts }}"
          echo "  origin:  ${{ github.event.client_payload.run_url }}"
          echo
          echo "Full client_payload (json):"
          cat <<'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF
