name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build tree-sitter artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate parser
        run: npx tree-sitter generate

      - name: Run corpus tests
        run: npx tree-sitter test

      - name: Build WASM
        run: npx tree-sitter build --wasm

      - name: Smoke-check embedded grammars manifest
        run: scripts/smoke-grammars.sh

      - name: Package artifact
        run: |
          mkdir -p dist/src dist/queries dist/shared
          cp src/parser.c dist/src/
          cp src/scanner.c dist/src/
          mkdir -p dist/src/tree_sitter
          cp src/tree_sitter/parser.h dist/src/tree_sitter/
          cp queries/*.scm dist/queries/
          cp grammar.js dist/
          cp package.json dist/
          cp tree-sitter.json dist/
          cp shared/embedded-grammars.json dist/shared/
          if [ -f tree-sitter-lex.wasm ]; then
            cp tree-sitter-lex.wasm dist/
          fi
          tar -czvf tree-sitter.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tree-sitter
          path: tree-sitter.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get release notes from tag annotation
        id: notes
        run: |
          BODY=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: tree-sitter
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Layer 2 of cross-repo release automation (lex-fmt/lex#640). After a
  # successful release, notify editor repos that pin tree-sitter (via
  # shared/lex-deps.json) so they run their on-upstream-released
  # handler. Editors also receive an event from lex releasing; whichever
  # event arrives later is the one that actually drives the editor cut.
  notify-downstreams:
    needs: release
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify downstream editors
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for repo in lex-fmt/vscode lex-fmt/nvim lex-fmt/lexed; do
            echo "Notifying $repo of tree-sitter-lex@$VERSION"
            gh api "repos/$repo/dispatches" --method POST \
              -f event_type=upstream-released \
              -F "client_payload[source]=tree-sitter-lex" \
              -F "client_payload[version]=$VERSION" \
              -F "client_payload[ts]=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -F "client_payload[run_url]=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          done
