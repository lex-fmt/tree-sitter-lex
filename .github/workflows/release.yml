name: Release

# Thin caller of arthur-debert/release/.github/workflows/tree-sitter.yml@v3.
# All the matrix + build + bundle + publish logic lives there. This file
# carries the bindings (version input, secrets) and the per-consumer
# follow-up: notifying downstream editors after a successful release.
#
# Replaces the prior hand-rolled, tag-push-triggered workflow. New trigger
# contract is workflow_dispatch — matching the cross-repo cascade-handler
# pattern that the release orchestrator (arthur-debert/release/bin/release-lex)
# drives.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.11.0 or 1.0.0-rc.1). No leading v.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/release/.github/workflows/tree-sitter.yml@v3
    with:
      version: ${{ inputs.version }}
      # parser-name derives automatically from package.json's "name"
      # field (`tree-sitter-lex` → `lex`); we override only if the
      # convention breaks.
      # parser-name: lex
      # publish-npm stays off: tree-sitter-lex ships exclusively
      # through the GH release tarball that downstream editors
      # consume via shared/lex-deps.json + fetch-artifact (Wave 3).
      publish-npm: false
      run-corpus-tests: true
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  # Layer 2 of the cross-repo release cascade (lex-fmt/lex#640). After
  # the reusable workflow finishes, notify the editor repos that pin
  # tree-sitter via shared/lex-deps.json. This logic is consumer-
  # specific (the list of downstreams lives here, not in the reusable
  # workflow), so it stays in the thin caller. The cascade-handler
  # design intentionally keeps fan-out lists co-located with their
  # upstream.
  notify-downstreams:
    needs: release
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify downstream editors
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VERSION: v${{ inputs.version }}
        run: |
          set -euo pipefail
          for repo in lex-fmt/vscode lex-fmt/nvim lex-fmt/lexed; do
            echo "Notifying ${repo} of tree-sitter-lex@${VERSION}"
            gh api "repos/${repo}/dispatches" --method POST \
              -f event_type=upstream-released \
              -F "client_payload[source]=tree-sitter-lex" \
              -F "client_payload[version]=${VERSION}" \
              -F "client_payload[ts]=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -F "client_payload[run_url]=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          done
